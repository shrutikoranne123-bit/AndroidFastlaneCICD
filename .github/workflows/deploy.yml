name: Test Android CI

on:
  push:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # ✅ Setup Ruby with Bundler Cache (FIXES YOUR ERROR)
      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: 3.2
          bundler-cache: true

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # ✅ Decode Keystore
      - name: Decode Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > my-release-key.jks

      - name: Grant Gradle Permission
        run: chmod +x gradlew

      # ✅ Run Fastlane (Using Bundler)
      - name: Run Fastlane Build (Creates AAB)
        run: bundle exec fastlane android build_internal
        env:
          KEYSTORE_PATH: my-release-key.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      # ✅ Download bundletool
      - name: Download bundletool
        run: |
          curl -L -o bundletool.jar \
          https://github.com/google/bundletool/releases/download/1.15.6/bundletool-all-1.15.6.jar

      # ✅ Convert AAB → Universal APK
      - name: Convert AAB to Universal APK
        run: |
          java -jar bundletool.jar build-apks \
            --bundle=app/build/outputs/bundle/release/app-release.aab \
            --output=app.apks \
            --mode=universal

          unzip app.apks -d apks

      # ✅ Upload AAB
      - name: Upload AAB Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-aab
          path: app/build/outputs/bundle/release/app-release.aab

      # ✅ Upload Universal APK
      - name: Upload Universal APK
        uses: actions/upload-artifact@v4
        with:
          name: universal-apk
          path: apks/universal.apk